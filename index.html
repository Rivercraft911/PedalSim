<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Dowdy Distortion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Big+Shoulders+Display:wght@600;800&family=Martian+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css?v=4" />
    <link rel="stylesheet" href="css/workbench.css?v=4" />
  </head>
  <body>
    <div class="start-gate" id="start-gate">
      <h1>Dowdy<br />Distortion</h1>
      <p>Analog pedal lab</p>
      <button id="start-button" type="button">Tap to start</button>
    </div>

    <div class="modal hidden" id="mic-warning" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2>Headphones on?</h2>
        <p>Live mic input can feed back through speakers.</p>
        <button id="mic-cancel" type="button">Cancel</button>
        <button id="mic-confirm" class="accent" type="button">Use mic</button>
      </div>
    </div>

    <header class="topbar">
      <div class="brand">
        <span>Dowdy Distortion</span>
        <small>Pedal workbench</small>
      </div>
      <div class="source-bar" aria-label="Audio source">
        <span>Source</span>
        <button class="source active" data-source="tone" type="button">
          Test tone
        </button>
        <button class="source" data-source="mic" type="button">Mic</button>
        <button class="source" data-source="file" type="button">File</button>
        <input id="file-input" type="file" accept="audio/*" hidden />
      </div>
      <div class="meters">
        <span>IN <b id="input-meter">−∞</b></span
        ><span>OUT <b id="output-meter">−∞</b></span>
      </div>
    </header>

    <main class="workbench">
      <section class="circuit-panel panel">
        <div class="panel-heading">
          <span>Circuit canvas</span><em id="status-line">Ready</em>
        </div>
        <div class="schematic-scroll">
          <svg
            id="schematic"
            viewBox="0 0 960 360"
            role="img"
            aria-label="Active pedal circuit schematic"
          >
            <defs>
              <pattern
                id="grid"
                width="24"
                height="24"
                patternUnits="userSpaceOnUse"
              >
                <path
                  d="M24 0H0V24"
                  fill="none"
                  stroke="currentColor"
                  opacity=".08"
                />
              </pattern>
            </defs>
            <rect width="960" height="360" fill="url(#grid)" />
            <g class="circuit-stage" data-stage="gain">
              <line class="sch-wire" x1="46" y1="164" x2="105" y2="164" />
              <circle class="sch-jack" cx="34" cy="164" r="11" />
              <circle class="sch-jack-dot" cx="34" cy="164" r="3" />
              <text class="sch-label" x="34" y="199">INPUT</text>
              <path
                class="sch-component"
                d="M105 164h10l7-13 14 26 14-26 14 26 14-26 14 26 7-13h14"
              />
              <text class="sch-label" x="152" y="131">R1 DRIVE</text>
              <text class="sch-value" data-edit="driveR" x="152" y="195">
                10 kΩ
              </text>
            </g>
            <g class="circuit-stage" data-stage="clip">
              <line class="sch-wire" x1="213" y1="164" x2="352" y2="164" />
              <circle class="sch-node" cx="213" cy="164" r="3.5" />
              <line class="sch-wire" x1="213" y1="164" x2="213" y2="212" />
              <line class="sch-wire" x1="181" y1="212" x2="245" y2="212" />
              <line class="sch-wire" x1="181" y1="212" x2="181" y2="230" />
              <polygon class="sch-diode" points="169,230 193,230 181,248" />
              <line class="sch-component" x1="169" y1="252" x2="193" y2="252" />
              <line class="sch-wire" x1="181" y1="252" x2="181" y2="282" />
              <line class="sch-wire" x1="245" y1="212" x2="245" y2="230" />
              <line class="sch-component" x1="233" y1="230" x2="257" y2="230" />
              <polygon class="sch-diode" points="233,252 257,252 245,230" />
              <line class="sch-wire" x1="245" y1="252" x2="245" y2="282" />
              <line class="sch-wire" x1="181" y1="282" x2="245" y2="282" />
              <line class="sch-wire" x1="213" y1="282" x2="213" y2="300" />
              <path class="sch-ground" d="M198 300h30m-24 7h18m-12 7h6" />
              <text class="sch-label" id="sch-clip-name" x="213" y="326">
                SHUNT CLIPPER
              </text>
              <text class="sch-value" id="sch-diode" x="213" y="344">
                Si 1N4148 · symmetric
              </text>
            </g>
            <g class="circuit-stage" data-stage="tone">
              <polygon class="sch-component" points="352,139 352,189 395,164" />
              <text class="sch-label" x="373" y="126">BUFFER</text>
              <line class="sch-wire" x1="395" y1="164" x2="448" y2="164" />
              <path
                class="sch-component"
                d="M448 164h10l7-13 14 26 14-26 14 26 14-26 14 26 7-13h14"
              />
              <text class="sch-label" x="495" y="131">R2 TONE</text>
              <text class="sch-value" data-edit="toneR" x="495" y="195">
                10 kΩ
              </text>
              <line class="sch-wire" x1="556" y1="164" x2="704" y2="164" />
              <circle class="sch-node" cx="556" cy="164" r="3.5" />
              <line class="sch-wire" x1="556" y1="164" x2="556" y2="218" />
              <line class="sch-component" x1="536" y1="218" x2="576" y2="218" />
              <line class="sch-component" x1="536" y1="230" x2="576" y2="230" />
              <line class="sch-wire" x1="556" y1="230" x2="556" y2="284" />
              <path class="sch-ground" d="M541 284h30m-24 7h18m-12 7h6" />
              <text class="sch-label" x="588" y="223">C1 TONE</text>
              <text class="sch-value" data-edit="toneC" x="588" y="242">
                47 nF
              </text>
              <text class="sch-label" id="sch-tone-name" x="604" y="326">
                RC LOW-PASS
              </text>
            </g>
            <g class="circuit-stage" data-stage="level">
              <polygon class="sch-component" points="704,144 704,184 744,164" />
              <text class="sch-label" x="724" y="131">LEVEL</text>
              <text class="sch-value" data-edit="level" x="724" y="205">
                0.9×
              </text>
              <line class="sch-wire" x1="744" y1="164" x2="895" y2="164" />
              <circle class="sch-jack" cx="909" cy="164" r="11" />
              <circle class="sch-jack-dot" cx="909" cy="164" r="3" />
              <text class="sch-label" x="909" y="199">OUTPUT</text>
            </g>
            <text class="sch-caption" id="sch-gain" x="151" y="102">
              CLEAN BOOST · 4×
            </text>
            <text class="sch-caption" x="480" y="342">
              Click an amber value to enter an exact component value.
            </text>
          </svg>
        </div>
        <div class="readout-strip">
          <span>CLIP <b id="clip-readout">Si 1N4148</b></span
          ><span>CUTOFF <b id="cutoff-readout">339 Hz</b></span
          ><span>HARMONICS <b id="harmonic-readout">—</b></span>
        </div>
      </section>

      <aside class="rack panel">
        <div class="panel-heading">
          <span>Block rack</span
          ><button id="reset-button" class="quiet" type="button">Reset</button>
        </div>
        <label
          >Gain block<select id="gain-block">
            <option value="boost">Clean boost</option>
            <option value="unity">Unity</option>
            <option value="pad">Input pad</option>
          </select></label
        >
        <label
          >Clipper<select id="clipper-block">
            <option value="shunt">Shunt diode</option>
            <option value="feedback">Feedback diode</option>
            <option value="hard">Hard clipper</option>
          </select></label
        >
        <label
          >Tone block<select id="tone-block">
            <option value="lowpass">Low pass</option>
            <option value="highpass">High pass</option>
            <option value="tilt">Tilt shelf</option>
          </select></label
        >
        <div class="diode-row">
          <label
            >Diode<select id="diode-select">
              <option value="si">Silicon 1N4148</option>
              <option value="ge">Germanium 1N34A</option>
              <option value="schottky">Schottky BAT41</option>
              <option value="led">Red LED</option>
              <option value="greenLed">Green LED</option>
              <option value="blueLed">Blue LED</option>
              <option value="custom">Custom</option>
            </select></label
          ><button id="symmetry-button" type="button">Symmetric</button>
        </div>
        <div class="knob-grid" id="knob-grid"></div>
        <div class="custom-diode hidden" id="custom-diode">
          <label
            >Is <input id="is-slider" type="range" min="0" max="1000" /></label
          ><label
            >n <input id="n-slider" type="range" min="100" max="250"
          /></label>
        </div>
        <div class="bypass-row">
          <button data-bypass="clip" type="button">Bypass clip</button
          ><button data-bypass="tone" type="button">Bypass tone</button
          ><button data-bypass="level" type="button">Bypass level</button>
        </div>
      </aside>

      <section class="measurements panel">
        <div class="panel-heading">
          <span>Measurements</span>
          <div class="compare-selects">
            <select id="overlay-a"></select
            ><select id="overlay-b"></select>
          </div>
        </div>
        <div class="plot-grid">
          <figure>
            <figcaption>Input scope</figcaption>
            <canvas id="scope-in"></canvas>
          </figure>
          <figure>
            <figcaption>Output scope</figcaption>
            <canvas id="scope-out"></canvas>
          </figure>
          <figure>
            <figcaption>Output spectrum</figcaption>
            <canvas id="spectrum"></canvas>
          </figure>
          <figure>
            <figcaption>Transfer curve</figcaption>
            <canvas id="transfer"></canvas>
          </figure>
          <figure>
            <figcaption>Frequency response</figcaption>
            <canvas id="response"></canvas>
          </figure>
          <figure class="sweep-figure">
            <figcaption>
              Sweep lab
              <span
                ><select id="sweep-part">
                  <option value="driveR">R1</option>
                  <option value="toneR">R2</option>
                  <option value="toneC">C1</option></select
                ><button id="run-sweep" type="button">Run</button></span
              >
            </figcaption>
            <canvas id="sweep"></canvas>
            <div id="sweep-values" class="sweep-values"></div>
          </figure>
        </div>
      </section>

      <aside class="builds panel">
        <div class="panel-heading"><span>Build library</span></div>
        <div class="build-save">
          <input
            id="build-name"
            maxlength="32"
            placeholder="Build name"
          /><button id="save-build" class="accent" type="button">Save</button>
        </div>
        <div id="build-list" class="build-list"></div>
        <div class="parts-heading">Active parts</div>
        <table>
          <thead>
            <tr>
              <th>Ref</th>
              <th>Part</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="parts-body"></tbody>
        </table>
        <div class="cutoff" id="cutoff-note"></div>
        <button id="copy-parts" class="quiet" type="button">
          Copy parts list
        </button>
      </aside>
    </main>

    <script defer src="js/circuit.js?v=4"></script>
    <script defer src="js/builds.js?v=4"></script>
    <script defer src="js/audio.js?v=4"></script>
    <script defer src="js/plots.js?v=4"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/app.js?v=4"></script>
  </body>
</html>
