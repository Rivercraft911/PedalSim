<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Dowdy Distortion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Big+Shoulders+Display:wght@600;800&family=Martian+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/workbench.css" />
  </head>
  <body>
    <div class="start-gate" id="start-gate">
      <h1>Dowdy<br />Distortion</h1>
      <p>Analog pedal lab</p>
      <button id="start-button" type="button">Tap to start</button>
    </div>

    <div class="modal hidden" id="mic-warning" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2>Headphones on?</h2>
        <p>Live mic input can feed back through speakers.</p>
        <button id="mic-cancel" type="button">Cancel</button>
        <button id="mic-confirm" class="accent" type="button">Use mic</button>
      </div>
    </div>

    <header class="topbar">
      <div class="brand">
        <span>Dowdy Distortion</span>
        <small>Pedal workbench</small>
      </div>
      <div class="source-bar" aria-label="Audio source">
        <span>Source</span>
        <button class="source active" data-source="tone" type="button">
          Test tone
        </button>
        <button class="source" data-source="mic" type="button">Mic</button>
        <button class="source" data-source="file" type="button">File</button>
        <input id="file-input" type="file" accept="audio/*" hidden />
      </div>
      <div class="meters">
        <span>IN <b id="input-meter">−∞</b></span
        ><span>OUT <b id="output-meter">−∞</b></span>
      </div>
    </header>

    <main class="workbench">
      <section class="circuit-panel panel">
        <div class="panel-heading">
          <span>Circuit canvas</span><em id="status-line">Ready</em>
        </div>
        <svg
          id="schematic"
          viewBox="0 0 960 330"
          aria-label="Active pedal circuit"
        >
          <defs>
            <pattern
              id="grid"
              width="24"
              height="24"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M24 0H0V24"
                fill="none"
                stroke="currentColor"
                opacity=".08"
              />
            </pattern>
          </defs>
          <rect width="960" height="330" fill="url(#grid)" />
          <g class="wire">
            <path d="M54 160H135M275 160H365M525 160H655M815 160H900" />
          </g>
          <g class="jack">
            <circle cx="42" cy="160" r="11" />
            <text x="42" y="199">IN</text>
          </g>
          <g class="jack">
            <circle cx="918" cy="160" r="11" />
            <text x="918" y="199">OUT</text>
          </g>
          <g class="block gain">
            <rect x="135" y="116" width="140" height="88" rx="4" />
            <text x="205" y="145">GAIN</text>
            <text class="value" x="205" y="177" id="sch-gain">4×</text>
          </g>
          <g class="block clip">
            <rect x="365" y="116" width="160" height="88" rx="4" />
            <text x="445" y="145" id="sch-clip-name">SHUNT CLIP</text>
            <text class="value" x="445" y="177" id="sch-r1">10 kΩ</text>
          </g>
          <g class="block tone">
            <rect x="655" y="116" width="160" height="88" rx="4" />
            <text x="735" y="145" id="sch-tone-name">LOW PASS</text>
            <text class="value" x="735" y="177" id="sch-tone">
              10 kΩ · 47 nF
            </text>
          </g>
          <text class="caption" x="205" y="245">simulation preamp</text>
          <text class="caption" x="445" y="245">D1 · D2</text>
          <text class="caption" x="735" y="245">R2 · C1</text>
        </svg>
        <div class="readout-strip">
          <span>CLIP <b id="clip-readout">Si 1N4148</b></span
          ><span>CUTOFF <b id="cutoff-readout">339 Hz</b></span
          ><span>HARMONICS <b id="harmonic-readout">—</b></span>
        </div>
      </section>

      <aside class="rack panel">
        <div class="panel-heading">
          <span>Block rack</span
          ><button id="reset-button" class="quiet" type="button">Reset</button>
        </div>
        <label
          >Gain block<select id="gain-block">
            <option value="boost">Clean boost</option>
            <option value="unity">Unity</option>
          </select></label
        >
        <label
          >Clipper<select id="clipper-block">
            <option value="shunt">Shunt diode</option>
            <option value="feedback">Feedback diode</option>
          </select></label
        >
        <label
          >Tone block<select id="tone-block">
            <option value="lowpass">Low pass</option>
            <option value="highpass">High pass</option>
            <option value="tilt">Tilt shelf</option>
          </select></label
        >
        <div class="diode-row">
          <label
            >Diode<select id="diode-select">
              <option value="si">Silicon 1N4148</option>
              <option value="ge">Germanium 1N34A</option>
              <option value="led">Red LED</option>
              <option value="custom">Custom</option>
            </select></label
          ><button id="symmetry-button" type="button">Symmetric</button>
        </div>
        <div class="knob-grid" id="knob-grid"></div>
        <div class="custom-diode hidden" id="custom-diode">
          <label
            >Is <input id="is-slider" type="range" min="0" max="1000" /></label
          ><label
            >n <input id="n-slider" type="range" min="100" max="250"
          /></label>
        </div>
        <div class="bypass-row">
          <button data-bypass="clip" type="button">Bypass clip</button
          ><button data-bypass="tone" type="button">Bypass tone</button
          ><button data-bypass="level" type="button">Bypass level</button>
        </div>
      </aside>

      <section class="measurements panel">
        <div class="panel-heading">
          <span>Measurements</span>
          <div class="compare-selects">
            <select id="overlay-a"></select
            ><select id="overlay-b"></select>
          </div>
        </div>
        <div class="plot-grid">
          <figure>
            <figcaption>Input scope</figcaption>
            <canvas id="scope-in"></canvas>
          </figure>
          <figure>
            <figcaption>Output scope</figcaption>
            <canvas id="scope-out"></canvas>
          </figure>
          <figure>
            <figcaption>Output spectrum</figcaption>
            <canvas id="spectrum"></canvas>
          </figure>
          <figure>
            <figcaption>Transfer curve</figcaption>
            <canvas id="transfer"></canvas>
          </figure>
          <figure>
            <figcaption>Frequency response</figcaption>
            <canvas id="response"></canvas>
          </figure>
          <figure class="sweep-figure">
            <figcaption>
              Sweep lab
              <span
                ><select id="sweep-part">
                  <option value="driveR">R1</option>
                  <option value="toneR">R2</option>
                  <option value="toneC">C1</option></select
                ><button id="run-sweep" type="button">Run</button></span
              >
            </figcaption>
            <canvas id="sweep"></canvas>
            <div id="sweep-values" class="sweep-values"></div>
          </figure>
        </div>
      </section>

      <aside class="builds panel">
        <div class="panel-heading"><span>Build library</span></div>
        <div class="build-save">
          <input
            id="build-name"
            maxlength="32"
            placeholder="Build name"
          /><button id="save-build" class="accent" type="button">Save</button>
        </div>
        <div id="build-list" class="build-list"></div>
        <div class="parts-heading">Active parts</div>
        <table>
          <thead>
            <tr>
              <th>Ref</th>
              <th>Part</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="parts-body"></tbody>
        </table>
        <div class="cutoff" id="cutoff-note"></div>
        <button id="copy-parts" class="quiet" type="button">
          Copy parts list
        </button>
      </aside>
    </main>

    <script defer src="js/circuit.js"></script>
    <script defer src="js/builds.js"></script>
    <script defer src="js/audio.js"></script>
    <script defer src="js/plots.js"></script>
    <script defer src="js/ui.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
